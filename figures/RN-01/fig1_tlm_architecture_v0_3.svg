<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="900" viewBox="0 0 1100 900">
<style>
text { font-family: Arial, Helvetica, sans-serif; fill:#222; }
.title { font-size:28px; font-weight:bold; }
.subtitle { font-size:18px; font-style:italic; }
.box { fill:#f7f9fc; stroke:#3b5b92; stroke-width:2; rx:10; ry:10; }
.market { fill:#eef5ff; stroke:#1f4e79; stroke-width:3; rx:12; ry:12; }
.small { font-size:16px; }
.normal { font-size:18px; }
.bold { font-weight:bold; }
.arrow { stroke:#444; stroke-width:2.5; fill:none; marker-end:url(#arrow); }
.slot { fill:white; stroke:#666; stroke-width:1.5; }
</style>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
<path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
</marker>
</defs>

<text x="550" y="40" text-anchor="middle" class="title">Figure 1. Temporal Liquidity Market (TLM)</text>
<text x="550" y="68" text-anchor="middle" class="subtitle">Economic coordination between Physical Time and Blockchain Time</text>

<rect x="70" y="100" width="960" height="180" class="box"/>
<text x="550" y="130" text-anchor="middle" class="normal bold">PHYSICAL WORLD (Physical Time)</text>
<text x="120" y="175" class="normal">Business Logic</text>
<text x="300" y="175" class="normal">Oracle</text>
<text x="430" y="175" class="normal">DEX</text>
<text x="540" y="175" class="normal">Liquidation</text>
<text x="760" y="175" class="normal">Treasury</text>
<text x="550" y="225" text-anchor="middle" class="bold normal">Temporal Execution Profile (TEP)</text>
<text x="550" y="250" text-anchor="middle" class="small">Demand-side communication of execution preferences</text>

<line x1="550" y1="280" x2="550" y2="330" class="arrow"/>

<rect x="180" y="330" width="740" height="150" class="market"/>
<text x="550" y="365" text-anchor="middle" class="normal bold">TEMPORAL LIQUIDITY MARKET (TLM)</text>
<text x="550" y="392" text-anchor="middle" class="small">Economic coordination between two temporal domains</text>
<text x="250" y="430" class="small">• Protocol Rules</text>
<text x="420" y="430" class="small">• Builders</text>
<text x="560" y="430" class="small">• Validators</text>
<text x="730" y="430" class="small">• Proposers</text>
<text x="420" y="455" class="small">• Market Mechanisms</text>

<line x1="550" y1="480" x2="550" y2="540" class="arrow"/>

<rect x="70" y="540" width="960" height="220" class="box"/>
<text x="550" y="570" text-anchor="middle" class="normal bold">BLOCKCHAIN WORLD (Blockchain Time)</text>

<g transform="translate(140,620)">
<text x="15" y="-10" class="small">Slot100</text>
<rect width="110" height="80" class="slot"/>
<text x="20" y="30" class="small">Tx A</text>
<text x="20" y="55" class="small">Tx E</text>
</g>
<g transform="translate(300,620)">
<text x="15" y="-10" class="small">Slot101</text>
<rect width="110" height="80" class="slot"/>
<text x="20" y="30" class="small">Tx B</text>
<text x="20" y="55" class="small">Tx F</text>
</g>
<g transform="translate(460,620)">
<text x="15" y="-10" class="small">Slot102</text>
<rect width="110" height="80" class="slot"/>
<text x="18" y="45" class="small">Empty</text>
</g>
<g transform="translate(620,620)">
<text x="15" y="-10" class="small">Slot103</text>
<rect width="110" height="80" class="slot"/>
<text x="20" y="30" class="small">Tx C</text>
<text x="20" y="55" class="small">Tx G</text>
</g>
<g transform="translate(780,620)">
<text x="15" y="-10" class="small">Slot104</text>
<rect width="110" height="80" class="slot"/>
<text x="20" y="30" class="small">Tx D</text>
<text x="20" y="55" class="small">Tx H</text>
</g>

<line x1="550" y1="760" x2="550" y2="820" class="arrow"/>
<text x="550" y="855" text-anchor="middle" class="normal bold">Execution Outcome in Physical World</text>
</svg>
